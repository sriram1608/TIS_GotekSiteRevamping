<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    body { font-family: Arial, sans-serif; background-color: #f7f6f1; color: #333; margin: 0; padding: 20px; }
    .container { background-color: #ffffff; max-width: 600px; margin: 0 auto; padding: 30px; border: 1px solid #e0e0e0; }
    .header { border-bottom: 2px solid #2563eb; padding-bottom: 10px; margin-bottom: 20px; }
    .header h2 { color: #2563eb; margin: 0; }
    .content p { line-height: 1.6; }
    .details { background-color: #f9f9f9; padding: 15px; border-left: 4px solid #2563eb; margin-top: 20px; }
    .details p { margin: 5px 0; }
    .footer { margin-top: 30px; font-size: 12px; color: #888; text-align: center; border-top: 1px solid #eee; padding-top: 15px; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>New Contact Inquiry</h2>
    </div>
    <div class="content">
        <p>A new inquiry specification form has been submitted on the website.</p>
        
        <div class="details">
            <p><strong>Inquiry Details:</strong></p>
            <p><strong>Full Name:</strong> [User Name]</p>
            <p><strong>Phone Number:</strong> [Phone Number]</p>
            <p><strong>Email Address:</strong> [User Email]</p>
            <p><strong>Requirements/Message:</strong><br/> [Message]</p>
            <p><strong>Submission Time (IST):</strong> [Timestamp]</p>
        </div>
    </div>
    <div class="footer">
        GOTEK Automated Notification System
    </div>
</div>
</body>
</html>
