<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Career Application</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eaeef3; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #2c3e50; color: #ffffff; padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; }
        .header h2 { margin: 0; font-size: 20px; }
        .badge { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .content { padding: 30px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eeeeee; }
        th { width: 35%; color: #7f8c8d; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { color: #2c3e50; font-size: 15px; font-weight: 500; }
        .message-box { background: #f9f9f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 20px; color: #4a5568; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
        .message-title { font-weight: 600; color: #2d3748; margin-bottom: 10px; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Job Application</h2>
            <span class="badge">[Date]</span>
        </div>
        <div class="content">
            <table>
                <tr>
                    <th>Applicant Name</th>
                    <td>[Applicant Name]</td>
                </tr>
                <tr>
                    <th>Email Address</th>
                    <td><a href="mailto:[Applicant Email]">[Applicant Email]</a></td>
                </tr>
                <tr>
                    <th>Position Applied</th>
                    <td><strong>[Position Name]</strong></td>
                </tr>
                <tr>
                    <th>Resume / Portfolio URL</th>
                    <td><a href="[Resume URL]" target="_blank">[Resume URL]</a></td>
                </tr>
            </table>

            <div class="message-title">Introduction & Cover Message:</div>
            <div class="message-box">[Cover Message]</div>
        </div>
    </div>
</body>
</html>
